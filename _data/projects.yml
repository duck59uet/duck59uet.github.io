  description: | # this will include new lines to allow paragraphs
    Chắc có lẽ đến hôm nay là anh cũng không nhắn tin cho em cũng một khoảng một tuần rồi. Cũng không quá lâu và cũng không quá ngắn để nhìn lại những gì đã qua. Anh không rõ em có cảm nhận giống anh không.
    Ban đầu anh nghĩ rằng mình sẽ không thích em. Khoảng thời gian đầu anh gặp em, anh thấy một cô bé học Ngoại Thương dáng dấp bé nhỏ, chẳng gây lại ấn tượng gì cả. Lại còn được anh Tuyến với cái Linh gán ghép
    nên anh càng không thích. Nhưng dần dần, nhìn cách em cười với mọi thứ em làm, anh nghĩ là mình thích em! Nhiều lần nhắn tin thực chất anh cố tình làm lạc đi cuộc nói chuyện để không nảy sinh thêm tình cảm gì nữa.
    Điều đấy lại không thành công cho lắm khi anh nghĩ mình thích em nhiều hơn. Đến lúc thời gian vừa rồi, chắc đến lúc em nói rằng nên ít nhắn tin hơn và tìm người khác cỡ hơn tuần. Anh cũng biết là mình đang làm phiền nhiều.
    Có lẽ thời gian qua, anh đã đi quá nhanh khi nói lời thích vội vàng. Điều đấy chắc khiến em khó chịu nhiều, em lại tự bó buộc bản thân với những câu nói đấy. Ngoài ra, tầm em cũng có nhiều ước mơ, dự định riêng cho bản thân mình.
    Anh thời đấy cũng vậy, đợt đấy anh vào quarter life crisis đầu tiên của đời mình khi đang định hướng cho bản thân cho tương lai. Hê hê, được cái anh tự tin rằng mình sẽ là mang tới được cho em cảm giác hạnh phúc đến mãi về sau. 
    Nên chúng ta làm quen lại nha. Anh sẽ không nói lời thích vội vàng nữa, em cứ cảm nhận đi nha. Giờ cũng hơi muộn rồi, chúc em ngủ ngon. Tái bút: Người đàn ông lạc quan.
